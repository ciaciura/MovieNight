services:
  movienight-postgres:
    image: postgres:16
    container_name: movienight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: movienight
      POSTGRES_USER: movienight
      POSTGRES_PASSWORD: movienight_pw
    ports:
      - "5432:5432"
    volumes:
      - movienight_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movienight -d movienight"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  movienight_pgdata:

apiVersion: v1
kind: Namespace
metadata:
  name: movienight

---
apiVersion: v1
kind: Secret
metadata:
  name: movienight-postgres-secret
  namespace: movienight
type: Opaque
stringData:
  POSTGRES_DB: movienight
  POSTGRES_USER: movienight
  POSTGRES_PASSWORD: movienight_pw

---
apiVersion: v1
kind: Service
metadata:
  name: movienight-postgres
  namespace: movienight
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: movienight-postgres

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: movienight-postgres
  namespace: movienight
spec:
  serviceName: movienight-postgres
  replicas: 1
  selector:
    matchLabels:
      app: movienight-postgres
  template:
    metadata:
      labels:
        app: movienight-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: movienight-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
